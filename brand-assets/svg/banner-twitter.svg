<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <!-- Background -->
  <rect width="1500" height="500" fill="#1e1e1e"/>

  <!-- Subtle horizontal rule -->
  <line x1="0" y1="250" x2="1500" y2="250" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Left amber accent bar -->
  <rect x="0" y="0" width="6" height="500" fill="#e8a020"/>

  <!-- Logo mark left side -->
  <g transform="translate(80, 165) scale(2.9)">
    <rect x="2" y="2" width="56" height="56" fill="none" stroke="#e8a020" stroke-width="2.2"/>
    <rect x="11" y="11" width="15" height="34" fill="#e8a020"/>
    <rect x="30" y="11" width="17" height="17" fill="#252525"/>
    <rect x="30" y="31" width="17" height="14" fill="#e8a020" opacity="0.45"/>
  </g>

  <!-- AUTOMATION text -->
  <text x="295" y="260" font-family="'Bebas Neue', Impact, sans-serif" font-size="120" letter-spacing="8" fill="#e8e8e8">AUTOMATION</text>
  <!-- SWITCH text -->
  <text x="295" y="370" font-family="'Bebas Neue', Impact, sans-serif" font-size="120" letter-spacing="8" fill="#e8a020">SWITCH</text>

  <!-- Tagline -->
  <text x="295" y="430" font-family="'Courier New', monospace" font-size="22" letter-spacing="4" fill="#707070">WORKFLOW AUTOMATION · AI TOOLS · CONNECTED SYSTEMS</text>

