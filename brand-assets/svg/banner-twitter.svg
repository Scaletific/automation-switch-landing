  <rect x="1390" y="160" width="2" height="180" fill="#e8a020" opacity="0.3"/>
  <rect x="1400" y="100" width="2" height="300" fill="#e8a020" opacity="0.15"/>
  <rect x="1410" y="200" width="2" height="100" fill="#e8a020" opacity="0.5"/>
  <rect x="1420" y="140" width="2" height="220" fill="#e8a020" opacity="0.2"/>
  <rect x="1430" y="180" width="2" height="140" fill="#e8a020" opacity="0.35"/>
  <rect x="1440" y="120" width="2" height="260" fill="#e8a020" opacity="0.1"/>
  <rect x="1450" y="220" width="2" height="60" fill="#e8a020" opacity="0.6"/>
  <rect x="1460" y="170" width="2" height="160" fill="#e8a020" opacity="0.25"/>
  <rect x="1470" y="80" width="2" height="340" fill="#e8a020" opacity="0.08"/>
  <rect x="1480" y="210" width="2" height="80" fill="#e8a020" opacity="0.4"/>
