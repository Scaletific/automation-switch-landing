<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background -->
  <rect width="400" height="400" fill="#1e1e1e"/>

  <!-- Subtle grid lines for texture -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#2a2a2a" stroke-width="1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Logo mark centred at 200,200, scaled up -->
  <g transform="translate(110, 110) scale(3)">
    <!-- Outer border -->
    <rect x="2" y="2" width="56" height="56" fill="none" stroke="#e8a020" stroke-width="2.2"/>
    <!-- Left bar -->
    <rect x="11" y="11" width="15" height="34" fill="#e8a020"/>
    <!-- Top right dark block -->
    <rect x="30" y="11" width="17" height="17" fill="#252525"/>
    <!-- Bottom right amber dim -->
    <rect x="30" y="31" width="17" height="14" fill="#e8a020" opacity="0.45"/>
  </g>
</svg>
