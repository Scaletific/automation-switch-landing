<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 60" width="420" height="60">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;display=swap');
    </style>
  </defs>

  <!-- Logo mark -->
  <g transform="translate(0, 6)">
    <!-- Outer border -->
    <rect x="1" y="1" width="46" height="46" fill="none" stroke="#e8a020" stroke-width="2.5"/>
    <!-- Left bar (solid amber) -->
    <rect x="9" y="9" width="12" height="28" fill="#e8a020"/>
    <!-- Top right block (dark fill) -->
    <rect x="24" y="9" width="14" height="14" fill="#2a2a24"/>
    <!-- Bottom right block (amber dim) -->
    <rect x="24" y="26" width="14" height="11" fill="#e8a020" opacity="0.4"/>
  </g>

  <!-- AUTOMATION text -->
  <text x="62" y="42" font-family="'Bebas Neue', sans-serif" font-size="38" letter-spacing="3" fill="#e8e8e8">AUTOMATION</text>

  <!-- SWITCH text (amber) -->
  <text x="302" y="42" font-family="'Bebas Neue', sans-serif" font-size="38" letter-spacing="3" fill="#e8a020">SWITCH</text>
</svg>
